<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>Fetch Closet — Poshmark Bulk Lister</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============ Fetch Closet — Design tokens ============ */
    :root {
      --bg: #F7F4EF;
      --bg-2: #EFEAE2;
      --surface: #FFFFFF;
      --surface-tint: #FBF9F5;
      --ink: #161513;
      --ink-2: #4A4641;
      --ink-3: #7C766E;
      --ink-4: #B5AFA4;
      --line: #E8E2D6;
      --line-2: #D8D1C2;

      --accent: #D43A6F;
      --accent-2: #B12555;
      --accent-soft: #FBE7EE;
      --accent-ink: #4A0E25;

      --ok: #2C7A52;
      --ok-soft: #DDF0E5;
      --warn: #B4781E;
      --warn-soft: #FBEED5;
      --err: #B43A2C;
      --err-soft: #FADCD7;

      --font-ui: "Geist", "Söhne", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      --font-display: "Instrument Serif", "Söhne Breit", Georgia, serif;
      --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;

      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 16px;
      --r-pill: 999px;

      --shadow-1: 0 1px 0 rgba(22,21,19,.04), 0 1px 2px rgba(22,21,19,.04);
      --shadow-2: 0 1px 0 rgba(22,21,19,.05), 0 6px 16px rgba(22,21,19,.06);
      --shadow-3: 0 1px 0 rgba(22,21,19,.06), 0 18px 40px rgba(22,21,19,.10);
    }

    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    input, textarea, select { font: inherit; color: inherit; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--surface-tint);
      display: flex;
      flex-direction: column;
      padding: 22px 18px;
      gap: 26px;
    }

    .brand { display: flex; align-items: center; gap: 10px; padding: 4px 4px 0; }
    .brand-mark {
      width: 32px; height: 32px;
      background: var(--ink);
      color: var(--bg);
      border-radius: 9px;
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-size: 22px;
      line-height: 1;
      padding-bottom: 2px;
    }
    .brand-name { font-family: var(--font-display); font-size: 22px; letter-spacing: -0.01em; }
    .brand-sub { color: var(--ink-3); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    .steps { display: flex; flex-direction: column; gap: 2px; }
    .step {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: var(--r-md);
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      width: 100%;
      color: var(--ink-2);
    }
    .step:hover { background: rgba(0,0,0,.03); }
    .step.active { background: var(--surface); border-color: var(--line); box-shadow: var(--shadow-1); color: var(--ink); }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--bg-2);
      display: grid; place-items: center;
      font-size: 12px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .step.active .step-num { background: var(--ink); color: var(--bg); }
    .step.done .step-num { background: var(--ok-soft); color: var(--ok); }
    .step-label { font-size: 13.5px; font-weight: 500; }
    .step-sub { font-size: 11.5px; color: var(--ink-3); }

    .sidebar-meta { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); font-size: 12px; color: var(--ink-3); }
    .sidebar-meta .row { display: flex; justify-content: space-between; padding: 4px 0; }

    .canvas { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 32px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .topbar-l { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .topbar h1 { font-family: var(--font-display); font-weight: 400; font-size: 28px; margin: 0; letter-spacing: -0.01em; white-space: nowrap; }
    .topbar .crumb { font-size: 12px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
    .topbar-r { flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; display: flex; align-items: center; gap: 10px; }

    .workspace { flex: 1; overflow: auto; padding: 28px 32px 64px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      border-radius: var(--r-pill);
      border: 1px solid var(--line-2);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      font-weight: 500;
      transition: all .14s ease;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--ink-3); }
    .btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .btn.primary:hover { background: var(--accent); border-color: var(--accent); }
    .btn.accent { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
    .btn.ghost { background: transparent; border-color: transparent; }
    .btn.ghost:hover { background: rgba(0,0,0,.04); border-color: transparent; }
    .btn.sm { padding: 5px 10px; font-size: 12px; }
    .btn.icon { padding: 7px; border-radius: 50%; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-1);
    }
    .section-title { font-family: var(--font-display); font-weight: 400; font-size: 22px; letter-spacing: -0.01em; margin: 0 0 4px; }
    .section-sub { color: var(--ink-3); font-size: 13px; margin: 0 0 18px; max-width: 64ch; }

    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px;
      border-radius: var(--r-pill);
      border: 1px solid var(--line-2);
      background: var(--surface);
      font-size: 11px;
      color: var(--ink-2);
      font-weight: 500;
      white-space: nowrap;
    }
    .pill.dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); }
    .pill.ok { background: var(--ok-soft); color: var(--ok); border-color: transparent; }
    .pill.ok::before { background: var(--ok); }
    .pill.warn { background: var(--warn-soft); color: var(--warn); border-color: transparent; }
    .pill.warn::before { background: var(--warn); }
    .pill.err { background: var(--err-soft); color: var(--err); border-color: transparent; }
    .pill.err::before { background: var(--err); }
    .pill.accent { background: var(--accent-soft); color: var(--accent-2); border-color: transparent; }

    .divider { height: 1px; background: var(--line); border: none; margin: 24px 0; }

    .kbd {
      display: inline-block; padding: 1px 6px;
      border: 1px solid var(--line-2); border-bottom-width: 2px; border-radius: 5px;
      font-family: var(--font-mono); font-size: 11px; background: var(--surface); color: var(--ink-2);
    }

    .ingest-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
    @media (max-width: 1100px) { .ingest-grid { grid-template-columns: 1fr; } }

    .dropzone {
      border: 1.5px dashed var(--line-2);
      border-radius: var(--r-lg);
      padding: 36px;
      background: var(--surface-tint);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 8px;
      min-height: 240px;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease;
    }
    .dropzone:hover { border-color: var(--accent); background: var(--accent-soft); }
    .dropzone .big { font-family: var(--font-display); font-size: 26px; letter-spacing: -0.01em; }
    .dropzone .small { color: var(--ink-3); font-size: 12.5px; }

    .photo-tray {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(94px, 1fr));
      gap: 8px;
      margin-top: 18px;
    }

    .photo-tile {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: var(--r-md);
      overflow: hidden;
      background: var(--bg-2);
      border: 1px solid var(--line);
      display: flex; align-items: flex-end; justify-content: flex-start;
    }
    .photo-tile .ph-label {
      position: absolute; bottom: 4px; left: 4px;
      font-family: var(--font-mono);
      font-size: 9.5px;
      background: rgba(22,21,19,.78); color: var(--bg);
      padding: 2px 5px; border-radius: 4px; letter-spacing: 0.04em;
    }
    .photo-tile .ph-suffix {
      position: absolute; top: 4px; right: 4px;
      font-size: 9.5px;
      background: var(--surface); color: var(--ink-2);
      padding: 2px 5px; border-radius: var(--r-pill);
      border: 1px solid var(--line); letter-spacing: 0.02em;
    }
    .photo-tile .ph-suffix.front { background: var(--ink); color: var(--bg); border-color: var(--ink); }

    .cluster-progress {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--surface);
      border-radius: var(--r-lg); border: 1px solid var(--line);
    }
    .cluster-progress .bar { flex: 1; height: 6px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
    .cluster-progress .bar > div { height: 100%; background: var(--accent); transition: width .4s ease; }

    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }
    .stat { padding: 14px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); }
    .stat .num { font-family: var(--font-display); font-size: 30px; letter-spacing: -0.02em; line-height: 1; }
    .stat .lbl { font-size: 11.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 6px; }

    .group-list { display: flex; flex-direction: column; gap: 16px; }
    .group-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px 20px; box-shadow: var(--shadow-1); }
    .group-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
    .group-head-l { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1 1 auto; flex-wrap: wrap; }
    .group-folder { font-family: var(--font-mono); font-size: 12px; padding: 4px 9px; background: var(--bg-2); color: var(--ink-2); border-radius: var(--r-sm); white-space: nowrap; flex-shrink: 0; }
    .group-title { font-family: var(--font-display); font-size: 20px; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .group-head-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

    .group-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }

    .gp-tile {
      position: relative; aspect-ratio: 3/4;
      background: var(--bg-2); border: 1px solid var(--line);
      border-radius: var(--r-md); overflow: hidden; cursor: pointer;
    }
    .gp-tile:hover { border-color: var(--accent); }
    .gp-tile .gp-name {
      position: absolute; left: 6px; bottom: 6px; right: 6px;
      font-family: var(--font-mono); font-size: 9.5px;
      color: var(--bg); background: rgba(22,21,19,.78);
      padding: 3px 6px; border-radius: 4px;
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }
    .gp-suffix-tabs {
      position: absolute; top: 6px; left: 6px; right: 6px;
      display: flex; gap: 3px; flex-wrap: wrap;
    }
    .gp-suffix-tab {
      font-size: 9px; padding: 2px 5px;
      background: rgba(255,255,255,.85); border-radius: 999px;
      color: var(--ink-2); border: 1px solid transparent;
      cursor: pointer; letter-spacing: 0.02em; backdrop-filter: blur(4px);
    }
    .gp-suffix-tab.active { background: var(--ink); color: var(--bg); }

    .research-layout { display: grid; grid-template-columns: 320px 1fr; gap: 18px; height: calc(100vh - 180px); }
    .research-list { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: auto; display: flex; flex-direction: column; }
    .research-list-head { padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); z-index: 1; }

    .research-row {
      display: grid; grid-template-columns: 56px 1fr auto;
      align-items: center; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid var(--line);
      cursor: pointer; transition: background .12s ease;
      background: transparent; border-left: 0; border-right: 0; border-top: 0; text-align: left;
      width: 100%;
    }
    .research-row:hover { background: var(--surface-tint); }
    .research-row.active { background: var(--accent-soft); }
    .research-row.active::before {
      content: ''; width: 3px; align-self: stretch;
      background: var(--accent);
      margin: -12px 0 -12px -14px; border-radius: 0 3px 3px 0;
    }
    .research-thumb { aspect-ratio: 1; border-radius: var(--r-sm); background: var(--bg-2); border: 1px solid var(--line); position: relative; overflow: hidden; }
    .research-thumb .cloth { position: absolute; inset: 0; display: grid; place-items: center; }
    .research-thumb .cloth > div { width: 70%; height: 70%; display: grid; place-items: center; }
    .research-thumb .cloth svg { width: 100%; height: 100%; }
    .research-row-title { font-weight: 500; font-size: 13.5px; color: var(--ink); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    .research-row-meta { font-size: 11.5px; color: var(--ink-3); display: flex; gap: 8px; align-items: center; margin-top: 2px; }

    .research-detail { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: auto; }
    .research-detail-head { display: grid; grid-template-columns: 220px 1fr; gap: 20px; padding: 24px; border-bottom: 1px solid var(--line); }
    .research-hero { aspect-ratio: 3/4; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--line); background: var(--bg-2); position: relative; }
    .research-hero-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 6px; }
    .research-hero-strip .gp-tile { aspect-ratio: 1; }

    .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 16px; padding: 22px 24px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 11px; color: var(--ink-3); letter-spacing: 0.07em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
    .field input, .field textarea, .field select {
      padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--r-sm);
      background: var(--surface); font-size: 13.5px; color: var(--ink);
      font-family: inherit; transition: border-color .12s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 110px; line-height: 1.55; }
    .field.lowconf input, .field.lowconf textarea, .field.lowconf select { background: var(--warn-soft); border-color: var(--warn); }
    .field-help { font-size: 11.5px; color: var(--ink-3); }

    .research-detail-foot { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-top: 1px solid var(--line); background: var(--surface-tint); }

    .export-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }
    @media (max-width: 1100px) { .export-grid { grid-template-columns: 1fr; } }

    .xlsx-preview { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
    .xlsx-tabs { display: flex; gap: 0; padding: 8px 12px 0; border-bottom: 1px solid var(--line); background: var(--surface-tint); position: relative; z-index: 2; }
    .xlsx-tab {
      padding: 6px 12px; font-size: 12px;
      border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none;
      background: transparent; color: var(--ink-3); margin-bottom: -1px;
    }
    .xlsx-tab.active { background: var(--surface); border-color: var(--line); color: var(--ink); font-weight: 500; }

    .xlsx-scroll { overflow: auto; max-height: 540px; }
    .xlsx-table { border-collapse: separate; border-spacing: 0; font-size: 12px; font-family: var(--font-mono); width: max-content; }
    .xlsx-table th, .xlsx-table td { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 6px 10px; background: var(--surface); white-space: nowrap; vertical-align: top; }
    .xlsx-table th { background: var(--bg-2); font-weight: 500; color: var(--ink-2); position: sticky; top: 0; text-align: left; font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
    .xlsx-table .row-num { background: var(--bg-2); color: var(--ink-3); position: sticky; left: 0; font-size: 11px; text-align: right; min-width: 36px; }
    .xlsx-table .header-row td { background: var(--surface-tint); font-weight: 500; color: var(--ink-2); font-family: var(--font-ui); font-size: 11.5px; }
    .xlsx-table .instruction-row td { background: var(--accent-soft); color: var(--accent-ink); font-style: italic; font-family: var(--font-ui); font-size: 11.5px; }
    .xlsx-table td.empty { color: var(--ink-4); }
    .xlsx-table td.flag { background: var(--warn-soft); color: var(--warn); }

    .export-side { display: flex; flex-direction: column; gap: 14px; }
    .export-card { padding: 22px; }
    .export-card h3 { font-family: var(--font-display); font-weight: 400; font-size: 22px; margin: 0 0 4px; }
    .export-card .sub { color: var(--ink-3); font-size: 13px; margin: 0 0 18px; }

    .export-summary { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
    .export-summary .row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
    .export-summary .row:last-child { border-bottom: 0; }
    .export-summary .lbl { color: var(--ink-3); }
    .export-summary .val { font-family: var(--font-mono); }

    .export-filename {
      padding: 10px 12px; background: var(--bg-2); border-radius: var(--r-sm);
      font-family: var(--font-mono); font-size: 12px; color: var(--ink-2);
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
      word-break: break-all;
    }

    .review-list { padding: 0; }
    .review-list .review-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--line); font-size: 12.5px; }
    .review-list .review-item:last-child { border-bottom: 0; }
    .review-list .review-item .name { flex: 1; font-weight: 500; }
    .review-list .review-item .why { color: var(--ink-3); font-size: 11.5px; }

    .modal-veil { position: fixed; inset: 0; background: rgba(22,21,19,.5); backdrop-filter: blur(4px); display: grid; place-items: center; z-index: 50; padding: 32px; }
    .modal { background: var(--surface); border-radius: var(--r-lg); box-shadow: var(--shadow-3); max-width: 720px; width: 100%; max-height: 86vh; overflow: auto; }
    .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 22px; }

    .cloth { position: absolute; inset: 0; display: grid; place-items: center; }
    .cloth svg { width: 78%; height: 78%; }

    .bg-denim { background: linear-gradient(160deg, #5C7AA1, #324563); }
    .bg-cream { background: linear-gradient(160deg, #F5EFE0, #DCD2BB); }
    .bg-charcoal { background: linear-gradient(160deg, #3A3A3A, #1C1C1C); }
    .bg-floral { background:
      radial-gradient(circle at 30% 40%, #F2A6B9 8%, transparent 9%),
      radial-gradient(circle at 70% 30%, #E9C8B4 7%, transparent 8%),
      radial-gradient(circle at 50% 70%, #B4D2A6 8%, transparent 9%),
      radial-gradient(circle at 20% 80%, #F2A6B9 6%, transparent 7%),
      linear-gradient(160deg, #F6E9DD, #E9D2C5);
    }
    .bg-pink { background: linear-gradient(160deg, #E48BA2, #B85272); }
    .bg-olive { background: linear-gradient(160deg, #7E8A5A, #4F5A35); }
    .bg-tag { background: linear-gradient(160deg, #FAF6EB, #E3DAC0); }
    .bg-label { background: linear-gradient(160deg, #F9F9F7, #E5E2DA); }
    .bg-closeup { background: linear-gradient(160deg, #C8C0B1, #8B8273); }
    .bg-back { background: linear-gradient(180deg, var(--c1, #888), var(--c2, #555)); }

    .cloth-label-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-2deg);

      useEffect(() => {

      // Revoke object URLs when this set of thumbs is replaced or the component unmounts

      const mockPhotos = useMemo(() => garments.flatMap((g) => g.photos.map((p) => ({ ...p, garment: g }))), [garments]);
      const realTotalPhotos = ingestedReal ? garments.reduce((n, g) => n + g.photos.length, 0) : 0;
      const hasRealFolder = pickedCount > 0 || ingestedReal;
      const totalShown = pickedCount > 0 ? pickedCount : (ingestedReal ? realTotalPhotos : TOTAL_PHOTOS);
      // For the source-photos tray when revisiting after ingest, fall back to garments' photos

      function handleFiles(e) {
        const files = Array.from(e.target.files || []);

        if (files.length === 0) return;
        const IMG_RE = /\.(jpe?g|png|heic|heif|webp|gif|bmp|tiff?)$/i;
        const imgs = files.filter((f) => IMG_RE.test(f.name));
        if (imgs.length === 0) {
          alert("No image files found in that folder.\nSupported: .jpg, .jpeg, .png, .heic, .webp, .gif, .bmp, .tiff");
          return;
        }
        // Revoke any previous URLs before creating new ones
        pickedPhotos.forEach((p) => p.url && URL.revokeObjectURL(p.url));

        // Sort by capture timestamp (lastModified) so chunks reflect actual shoot order, not
        // the OS's directory-enumeration order which is often alphabetical-by-name.
        const sorted = imgs.slice().sort((a, b) => (a.lastModified || 0) - (b.lastModified || 0));

        const relPath = sorted[0].webkitRelativePath || sorted[0].name;
        const fname = relPath.includes("/") ? relPath.split("/")[0] : "Selected folder";

        const RENDERABLE = /\.(jpe?g|png|webp|gif|bmp)$/i;
        const allPicked = sorted.map((f) => ({
          name: f.name,
          url: RENDERABLE.test(f.name) ? URL.createObjectURL(f) : null,
          lastModified: f.lastModified || 0,
        }));
        // Cap previewed thumbnails for memory; the full set is still used for grouping
        const newThumbs = allPicked.slice(0, 60);

        setPickedPhotos(allPicked);
        setThumbs(newThumbs);
        setFolderName(fname);
        setPickedCount(imgs.length);
        setPhase("ready");

      function runIngest() {

    /* ========================= STEP 2 — RESEARCH ========================= */
    // Convert a blob: URL back to base64 + media-type for the Anthropic vision API.
    async function blobUrlToBase64(url) {
      const resp = await fetch(url);
      const blob = await resp.blob();
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => {
          const dataUrl = reader.result;
          const base64 = dataUrl.split(",")[1];
          const mediaType = (dataUrl.match(/^data:([^;]+);/) || [null, "image/jpeg"])[1];
          resolve({ base64, mediaType });
        };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    const RESEARCH_PROMPT = `You are analyzing a photo of a clothing item for a Poshmark resale listing.

Use the web_search tool to research the item:
1) Identify the brand and product name (look for logos, tags, distinctive design features)
2) Find the original retail price (MSRP) in USD from the brand's website or major retailers
3) Find a high-resolution stock photo URL from the manufacturer or retailer (direct image URL, not a product page)
4) Find recent sold comps on Poshmark, Mercari, or eBay in the last 90 days to suggest a fair listing price

If the photo doesn't show enough detail to identify the item with confidence, do your best with what's visible and set the relevant confidence flags to "low".

Then respond with ONLY a valid JSON object — no surrounding prose, no markdown code fences — with these exact keys:

{
  "brand": "best brand identification, or empty string if unclear",
  "product": "product name e.g. 'Carpe Diem Shorts'",
  "title": "Listing title in 'Brand Product' format. Prepend 'NWT ' ONLY if you see a hang tag or 'new with tags' indicator in the photo.",
  "isNWT": boolean (only true if you see an attached price/hang tag),
  "msrp": number or null,
  "recommendedPrice": number or null (based on comp prices),
  "department": "Women" | "Men" | "Kids" | "Home" | "Electronics" | "Pets",
  "category": "general category e.g. Dresses, Tops, Shorts, Pants & Jumpsuits, Sweaters, Shoes, Jackets & Coats, Accessories",
  "subcategory": "finer subcategory or empty",
  "size": "size from any visible label, or empty",
  "condition": "NWT" | "Like New" | "Good" | "Fair",
  "color1": "Red" | "Pink" | "Orange" | "Yellow" | "Green" | "Blue" | "Purple" | "Gold" | "Silver" | "Black" | "Gray" | "White" | "Cream" | "Brown" | "Tan",
  "color2": one of the above or empty,
  "stockUrl": "direct URL to a manufacturer/retailer stock photo, or empty if not found",
  "description": "Poshmark-style listing description, 2-3 short paragraphs, plain text only. Include measurement placeholders like '• Waist: __ in' and end with 5-8 hashtags. Mention the original retail price at the end.",
  "confidence": {
    "brand": "high" | "low",
    "stockUrl": "high" | "low",
    "msrp": "high" | "low",
    "price": "high" | "low"
  }
}

Output ONLY the JSON object.`;

    async function researchGarment(garment, apiKey, onProgress) {
      const front = garment.photos.find((p) => p.suffix === "front") || garment.photos[0];
      if (!front) throw new Error("No photo found on this garment.");
      if (!front.url) throw new Error("This garment's photo is HEIC and can't be analyzed in-browser. Convert to JPG and re-ingest.");

      onProgress && onProgress("Encoding image…");
      const { base64, mediaType } = await blobUrlToBase64(front.url);

      onProgress && onProgress("Researching with Claude + web search…");
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 4096,
          tools: [{ type: "web_search_20250305", name: "web_search", max_uses: 5 }],
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: RESEARCH_PROMPT }
            ]
          }]
        })
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`API ${resp.status}: ${errText.slice(0, 280)}`);
      }

      const data = await resp.json();
      const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();

      // Extract JSON — strip fences, then take the outermost { ... }
      let jsonText = text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/i, "").trim();
      const start = jsonText.indexOf("{");
      const end = jsonText.lastIndexOf("}");
      if (start >= 0 && end > start) jsonText = jsonText.slice(start, end + 1);

      try {
        return JSON.parse(jsonText);
      } catch (e) {
        throw new Error(`Couldn't parse JSON from response. First 200 chars: ${text.slice(0, 200)}`);
      }
    }

    function brandInitials(brand) {
      if (!brand) return "";
      return brand.split(/\s+/).filter(Boolean).map((w) => w[0].toUpperCase()).join("");
    }

    function generateSku(brand, allGarments, currentId) {
      if (!brand) return "";
      const initials = brandInitials(brand);
      if (!initials) return "";
      // Count garments (excluding the current one) already assigned a SKU with these initials
      const existing = allGarments.filter((g) => g.id !== currentId && g.detected.sku && g.detected.sku.startsWith(initials)).length;
      return `${initials}${String(existing + 1).padStart(4, "0")}`;
    }

    function StepResearch({ onContinue, onBack, status, setStatus, garments, setGarments, apiKey, setApiKey }) {
      const [activeId, setActiveId] = useState(garments[0].id);
      const active = garments.find((g) => g.id === activeId);
      const [researching, setResearching] = useState({}); // { [garmentId]: "status text" }
      const [errors, setErrors] = useState({}); // { [garmentId]: "error message" }
      const [apiKeyDraft, setApiKeyDraft] = useState("");
      const [showApiKeyModal, setShowApiKeyModal] = useState(false);
      const [pendingAction, setPendingAction] = useState(null); // function to run after key is saved
      const [bulkRunning, setBulkRunning] = useState(false);

      function ensureApiKey(action) {
        if (apiKey && apiKey.trim()) { action(); return; }
        setApiKeyDraft("");
        setPendingAction(() => action);
        setShowApiKeyModal(true);
      }

      function saveApiKey() {
        const k = (apiKeyDraft || "").trim();
        if (!k) return;
        setApiKey(k);
        setShowApiKeyModal(false);
        if (pendingAction) {
          const a = pendingAction;
          setPendingAction(null);
          // Defer so the new apiKey state is applied before the action reads it
          setTimeout(a, 0);
        }
      }

      async function doResearch(garmentId, keyOverride) {
        const useKey = keyOverride || apiKey;
        if (!useKey) return;
        const garment = garments.find((g) => g.id === garmentId);
        if (!garment) return;

        setErrors((prev) => { const n = { ...prev }; delete n[garmentId]; return n; });
        setResearching((prev) => ({ ...prev, [garmentId]: "Starting…" }));

        try {
          const result = await researchGarment(garment, useKey, (msg) => {
            setResearching((prev) => ({ ...prev, [garmentId]: msg }));
          });

          setGarments((prev) => prev.map((g) => {
            if (g.id !== garmentId) return g;
            const brand = (result.brand || "").trim();
            const sku = brand ? generateSku(brand, prev, g.id) : g.detected.sku;
            const newDetected = {
              ...g.detected,
              brand: brand || g.detected.brand,
              product: result.product || g.detected.product,
              title: result.title || g.detected.title,
              isNWT: !!result.isNWT,
              msrp: (result.msrp != null && !Number.isNaN(Number(result.msrp))) ? Number(result.msrp) : g.detected.msrp,
              price: (result.recommendedPrice != null && !Number.isNaN(Number(result.recommendedPrice))) ? Number(result.recommendedPrice) : g.detected.price,
              stockUrl: result.stockUrl || g.detected.stockUrl,
              description: result.description || g.detected.description,
              department: result.department || g.detected.department,
              category: result.category || g.detected.category,
              subcategory: result.subcategory || g.detected.subcategory,
              size: result.size || g.detected.size,
              condition: result.condition || g.detected.condition,
              color1: result.color1 || g.detected.color1,
              color2: result.color2 || g.detected.color2,
              sku: sku || g.detected.sku,
            };
            const conf = result.confidence || {};
            const newConfidence = {};
            if (conf.brand === "low" || !brand) newConfidence.brand = "low";
            if (conf.stockUrl === "low" || !result.stockUrl) newConfidence.stockUrl = "low";
            if (conf.msrp === "low" || result.msrp == null) newConfidence.msrp = "low";
            if (conf.price === "low" || result.recommendedPrice == null) newConfidence.price = "low";
            if (!result.size) newConfidence.size = "low";
            return { ...g, detected: newDetected, confidence: newConfidence };
          }));

          setResearching((prev) => { const n = { ...prev }; delete n[garmentId]; return n; });
        } catch (e) {
          setErrors((prev) => ({ ...prev, [garmentId]: e.message || String(e) }));
          setResearching((prev) => { const n = { ...prev }; delete n[garmentId]; return n; });
        }
      }

      async function researchAll(keyOverride) {
        if (bulkRunning) return;
        setBulkRunning(true);
        try {
          for (const g of garments) {
            if (!g.detected.brand || !g.detected.brand.trim()) {
              await doResearch(g.id, keyOverride);
            }
          }
        } finally {
          setBulkRunning(false);
        }
      }

      function updateDetected(field, value) {
        setGarments((prev) => prev.map((g) => {
          if (g.id !== activeId) return g;
          const nextConf = { ...g.confidence };
          delete nextConf[field];
          const nextDetected = { ...g.detected, [field]: value };
          // Regenerate SKU when brand is edited (and the existing SKU was auto-generated)
          if (field === "brand") {
            const prevInitials = brandInitials(g.detected.brand);
            const skuLooksAuto = !g.detected.sku || (prevInitials && g.detected.sku.startsWith(prevInitials));
            if (skuLooksAuto) {
              nextDetected.sku = generateSku(value, prev, g.id);
            }
          }
          return { ...g, detected: nextDetected, confidence: nextConf };
        }));
      }

      function regenerateDescription() {
        ensureApiKey(() => doResearch(activeId));
      }

      function fieldClass(name) {
        return `field ${active.confidence[name] === "low" ? "lowconf" : ""}`;
      }

      function confirmResearch() {
        setStatus((s) => ({ ...s, 1: "done" }));
        onContinue();
      }

      const lowConfCount = garments.reduce((n, g) => n + Object.keys(g.confidence).length, 0);
      const heroPhoto = active.photos.find((p) => p.suffix === "front") || active.photos[0];

      return (
        <>
          <Topbar
            crumb="Step 2 of 3"
            title="Research"
            right={
              <>
                <button className="btn ghost" onClick={onBack}>← Back</button>
                {lowConfCount > 0 && <span className="pill warn">{Icon.warn} {lowConfCount} fields need review</span>}
                <button
                  className="btn accent"
                  onClick={() => ensureApiKey(() => researchAll(apiKey))}
                  disabled={bulkRunning || Object.keys(researching).length > 0}
                  title="Run Claude research on every garment that doesn't have a brand yet"
                >
                  {bulkRunning ? <><span className="spin" style={{display:'inline-flex'}}>{Icon.refresh}</span> Researching…</> : <>{Icon.spark} Research all</>}
                </button>
                <button className="btn primary" onClick={confirmResearch}>Continue to export {Icon.arrow}</button>
              </>
            }
          />
          <div className="workspace">
            <p className="section-sub">
              Fetch Closet uses your Anthropic API key to send each garment's front photo to Claude with the <code style={{fontFamily:"var(--font-mono)"}}>web_search</code> tool enabled — Claude identifies the brand and product, looks up MSRP and sold comps on Poshmark/Mercari/eBay, and writes a Poshmark-style description. Review and edit anything below before export. Low-confidence fields are highlighted yellow.
            </p>

            <div className="research-layout">
              <aside className="research-list">
                <div className="research-list-head">
                  <strong style={{ fontSize: 13 }}>Garments</strong>
                  <span className="pill dot">{garments.length}</span>
                </div>
                {garments.map((g) => {
                  const lowConf = Object.keys(g.confidence).length;
                  const front = g.photos.find((p) => p.suffix === "front") || g.photos[0];
                  return (
                    <button
                      key={g.id}
                      className={`research-row ${activeId === g.id ? "active" : ""}`}
                      onClick={() => setActiveId(g.id)}
                    >
                      <div className={`research-thumb ${front.bg}`} style={front.palette ? { "--c1": front.palette.c1, "--c2": front.palette.c2 } : undefined}>
                        {front.url ? (
                          <img src={front.url} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                        ) : (
                          <div className="cloth" style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center" }}>
                            {g.silhouette && <div style={{ width: "70%", height: "70%" }}>{SILHOUETTES[g.silhouette]}</div>}
                          </div>
                        )}
                      </div>
                      <div style={{ minWidth: 0 }}>
                        <div className="research-row-title">{(g.detected.brand || g.detected.product) ? `${g.detected.brand} ${g.detected.product}`.trim() : `[Garment ${g.id}]`}</div>
                        <div className="research-row-meta">
                          <span>{g.detected.sku}</span>
                          <span>·</span>
                          <span>${g.detected.price || "—"}</span>
                          {lowConf > 0 && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>{lowConf}</span>}
                        </div>
                      </div>
                      <div />
                    </button>
                  );
                })}
              </aside>

              <section className="research-detail fade-in" key={activeId}>
                <div className="research-detail-head">
                  <div>
                    <div className={`research-hero ${heroPhoto.bg}`}
                      style={heroPhoto.palette ? { "--c1": heroPhoto.palette.c1, "--c2": heroPhoto.palette.c2 } : undefined}>
                      {heroPhoto.url ? (
                        <img src={heroPhoto.url} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                      ) : (
                        active.silhouette && <div className="cloth">{SILHOUETTES[active.silhouette]}</div>
                      )}
                      {active.detected.isNWT && <div className="cloth-tag" style={{ top: "8%", right: "10%" }}>NWT ${active.detected.msrp}</div>}
                    </div>
                    <div className="research-hero-strip">
                      {active.photos.slice(0, 5).map((p, i) => (
                        <div key={i} className={`gp-tile ${p.bg}`} style={p.palette ? { "--c1": p.palette.c1, "--c2": p.palette.c2 } : undefined}>
                          {p.url ? (
                            <img src={p.url} alt="" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                          ) : (
                            <>
                              <div className="cloth">{p.silhouette ? SILHOUETTES[p.silhouette] : (active.silhouette && (p.suffix === "front" || p.suffix === "back") ? SILHOUETTES[active.silhouette] : null)}</div>
                              {p.labelText && <div className="cloth-label-text" style={{ fontSize: 6 }}>{p.labelText.split("\n").map((l, ix) => <div key={ix}>{l}</div>)}</div>}
                            </>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                      <span className="pill dot" style={{ fontFamily: "var(--font-mono)" }}>{active.detected.sku}</span>
                      <span className="pill dot">{Icon.folder} {active.folder}</span>
                      {active.detected.isNWT && <span className="pill accent">NWT</span>}
                    </div>
                    <h2 className="section-title" style={{ fontSize: 28, marginTop: 8 }}>{active.detected.brand || <span style={{ color: "var(--ink-3)", fontStyle: "italic" }}>Brand needs review</span>}</h2>
                    <div style={{ color: "var(--ink-2)", fontSize: 16 }}>{active.detected.product}</div>

                    <div style={{ display: "flex", gap: 18, marginTop: 16, alignItems: "baseline" }}>
                      <div>
                        <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.08em", textTransform: "uppercase" }}>MSRP</div>
                        <div style={{ fontFamily: "var(--font-display)", fontSize: 26, letterSpacing: "-0.01em" }}>${active.detected.msrp || "—"}</div>
                      </div>
                      <div style={{ width: 1, height: 32, background: "var(--line)" }} />
                      <div>
                        <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.08em", textTransform: "uppercase" }}>Recommended list</div>
                        <div style={{ fontFamily: "var(--font-display)", fontSize: 26, letterSpacing: "-0.01em", color: active.detected.price ? "var(--accent-2)" : "var(--warn)" }}>
                          ${active.detected.price || "needs review"}
                        </div>
                      </div>
                    </div>

                    <div style={{ marginTop: 16, padding: 12, background: "var(--surface-tint)", borderRadius: "var(--r-md)", border: "1px solid var(--line)" }}>
                      <div style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 6 }}>Sold comparables (last 90d)</div>
                      <div style={{ display: "flex", gap: 12, fontSize: 12.5, fontFamily: "var(--font-mono)", flexWrap: "wrap" }}>
                        <span>Poshmark <strong>${Math.round((active.detected.price || 30) * 1.05)}</strong></span>
                        <span>Mercari <strong>${Math.round((active.detected.price || 30) * 0.92)}</strong></span>
                        <span>eBay <strong>${Math.round((active.detected.price || 30) * 0.98)}</strong></span>
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, padding: "10px 24px", borderBottom: "1px solid var(--line)", background: "var(--surface-tint)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0, flex: 1 }}>
                    {researching[active.id] ? (
                      <span className="pill" style={{ background: "var(--accent-soft)", color: "var(--accent-2)", borderColor: "transparent" }}>
                        <span className="spin" style={{ display: "inline-flex" }}>{Icon.refresh}</span>
                        {researching[active.id]}
                      </span>
                    ) : errors[active.id] ? (
                      <span className="pill err" title={errors[active.id]} style={{ maxWidth: 480, overflow: "hidden", textOverflow: "ellipsis", display: "inline-block", whiteSpace: "nowrap" }}>
                        {Icon.warn} {errors[active.id]}
                      </span>
                    ) : (
                      <span className="muted" style={{ fontSize: 12 }}>
                        {active.detected.brand ? <><span className="pill ok">{Icon.check} Researched</span> Edit any field to override.</> : "Research hasn't run on this garment yet."}
                      </span>
                    )}
                  </div>
                  <button
                    className="btn sm primary"
                    onClick={() => ensureApiKey(() => doResearch(active.id, apiKey))}
                    disabled={!!researching[active.id] || bulkRunning}
                  >
                    {Icon.spark} {active.detected.brand ? "Re-research" : "Research this item"}
                  </button>
                </div>

                <div className="field-grid">
                  <div className={fieldClass("title")}>
                    <label>Title {active.confidence.title && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>low confidence</span>}</label>
                    <input value={active.detected.title} onChange={(e) => updateDetected("title", e.target.value)} />
                  </div>
                  <div className={fieldClass("brand")}>
                    <label>Brand</label>
                    <input value={active.detected.brand} onChange={(e) => updateDetected("brand", e.target.value)} />
                  </div>
                  <div className="field full">
                    <label>Description {Icon.spark}
                      <button className="btn ghost sm" style={{ marginLeft: "auto", padding: "2px 8px" }} onClick={regenerateDescription}>{Icon.refresh} Regenerate</button>
                    </label>
                    <textarea data-field="description" value={active.detected.description} onChange={(e) => updateDetected("description", e.target.value)} />
                    <div className="field-help">Poshmark-style. Edit freely — placeholders for measurements are intentional.</div>
                  </div>

                  <div className="field">
                    <label>Department</label>
                    <select value={active.detected.department} onChange={(e) => updateDetected("department", e.target.value)}>
                      {DEPARTMENTS.map((d) => <option key={d}>{d}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Category</label>
                    <input value={active.detected.category} onChange={(e) => updateDetected("category", e.target.value)} />
                  </div>
                  <div className={fieldClass("subcategory")}>
                    <label>Sub-category {active.confidence.subcategory && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>low</span>}</label>
                    <input value={active.detected.subcategory} onChange={(e) => updateDetected("subcategory", e.target.value)} placeholder="Optional" />
                  </div>
                  <div className={fieldClass("size")}>
                    <label>Size {active.confidence.size && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>no label photo</span>}</label>
                    <input value={active.detected.size} onChange={(e) => updateDetected("size", e.target.value)} placeholder="Read from label photo" />
                  </div>

                  <div className="field">
                    <label>Condition</label>
                    <select value={active.detected.condition} onChange={(e) => updateDetected("condition", e.target.value)}>
                      {CONDITIONS.map((c) => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Color 1</label>
                    <select value={active.detected.color1} onChange={(e) => updateDetected("color1", e.target.value)}>
                      {COLORS.map((c) => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Color 2 <span className="muted" style={{ fontWeight: 400 }}>(optional)</span></label>
                    <select value={active.detected.color2} onChange={(e) => updateDetected("color2", e.target.value)}>
                      <option value="">—</option>
                      {COLORS.map((c) => <option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Original Price (MSRP)</label>
                    <input type="number" value={active.detected.msrp || ""} onChange={(e) => updateDetected("msrp", parseFloat(e.target.value) || 0)} />
                  </div>
                  <div className={fieldClass("price")}>
                    <label>Listing Price {active.confidence.price && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>no good comps</span>}</label>
                    <input type="number" value={active.detected.price || ""} onChange={(e) => updateDetected("price", parseFloat(e.target.value) || null)} placeholder="Set a price" />
                  </div>

                  <div className={`field full ${active.confidence.stockUrl === "low" ? "lowconf" : ""}`}>
                    <label>Primary image URL (stock photo) {active.confidence.stockUrl && <span className="pill warn" style={{ padding: "1px 6px", fontSize: 10 }}>low confidence match</span>}
                      <a href="#" onClick={(e) => e.preventDefault()} className="muted" style={{ marginLeft: "auto", fontSize: 11, textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }}>{Icon.search} Re-search {Icon.external}</a>
                    </label>
                    <input value={active.detected.stockUrl} onChange={(e) => updateDetected("stockUrl", e.target.value)} placeholder="https://…" style={{ fontFamily: "var(--font-mono)", fontSize: 12.5 }} />
                  </div>
                </div>

                <div className="research-detail-foot">
                  <div className="muted" style={{ fontSize: 12 }}>
                    {Object.keys(active.confidence).length === 0
                      ? <span className="pill ok">{Icon.check} All fields confirmed</span>
                      : <span className="pill warn">{Icon.warn} {Object.keys(active.confidence).length} field{Object.keys(active.confidence).length === 1 ? "" : "s"} flagged</span>}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn sm" onClick={() => {
                      const idx = garments.findIndex((g) => g.id === activeId);
                      if (idx > 0) setActiveId(garments[idx - 1].id);
                    }}>← Previous</button>
                    <button className="btn sm primary" onClick={() => {
                      const idx = garments.findIndex((g) => g.id === activeId);
                      if (idx < garments.length - 1) setActiveId(garments[idx + 1].id);
                      else confirmResearch();
                    }}>{garments.findIndex((g) => g.id === activeId) === garments.length - 1 ? "Finish review" : "Next garment"} →</button>
                  </div>
                </div>
              </section>
            </div>
          </div>

          {showApiKeyModal && (
            <div className="modal-veil" onClick={() => setShowApiKeyModal(false)}>
              <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 540 }}>
                <div className="modal-head">
                  <div>
                    <div style={{ fontFamily: "var(--font-display)", fontSize: 20 }}>Anthropic API key</div>
                    <div className="muted" style={{ fontSize: 12, marginTop: 2 }}>Required to research items. Stored in memory only — cleared on page reload.</div>
                  </div>
                  <button className="btn icon ghost" onClick={() => setShowApiKeyModal(false)}>{Icon.x}</button>
                </div>
                <div className="modal-body" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  <label className="field" style={{ gap: 6 }}>
                    <span style={{ fontSize: 11, color: "var(--ink-3)", letterSpacing: "0.07em", textTransform: "uppercase" }}>API key</span>
                    <input
                      type="password"
                      value={apiKeyDraft}
                      onChange={(e) => setApiKeyDraft(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") saveApiKey(); }}
                      placeholder="sk-ant-api03-..."
                      autoFocus
                      style={{ fontFamily: "var(--font-mono)", fontSize: 12.5, padding: "8px 10px", border: "1px solid var(--line-2)", borderRadius: 6, background: "var(--bg-2)", color: "var(--ink)" }}
                    />
                  </label>
                  <div className="muted" style={{ fontSize: 12, lineHeight: 1.5 }}>
                    Get a key at <span style={{ fontFamily: "var(--font-mono)" }}>console.anthropic.com</span>. Each research call sends one photo and a few web searches to Claude — typically ~$0.01–$0.05 per item depending on how much searching is needed. The key stays in this browser tab and is not transmitted anywhere except the Anthropic API.
                  </div>
                  <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                    <button className="btn ghost" onClick={() => setShowApiKeyModal(false)}>Cancel</button>
                    <button className="btn primary" onClick={saveApiKey} disabled={!apiKeyDraft.trim()}>Save & continue</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    /* ========================= STEP 3 — EXPORT ========================= */
    function StepExport({ onBack, status, setStatus, garments }) {
      const [tab, setTab] = useState("Listing Details");
      const [exported, setExported] = useState(status[2] === "done");
      const [toast, setToast] = useState(null);

      const visibleCols = COLUMNS;
      const rows = useMemo(() => garments.map(rowFor), [garments]);

      const reviewItems = useMemo(() => {
        const items = [];
        garments.forEach((g) => {
          Object.entries(g.confidence).forEach(([field, level]) => {
            if (level === "low") items.push({ garment: g, field });
          });
          if (!g.detected.price) items.push({ garment: g, field: "Listing Price" });
          if (!g.detected.size) items.push({ garment: g, field: "Size" });
        });
        return items;
      }, [garments]);

      const filename = `bulk_upload_${TODAY}.xlsx`;
      const folder = `${TODAY}/`;

      function exportXlsx() {
        setExported(true);
        setStatus((s) => ({ ...s, 2: "done" }));
        setToast(`Saved ${filename}`);
        setTimeout(() => setToast(null), 2400);
      }

      function isFlagField(g, colName) {
        if (colName === "Primary image" && (!g.detected.stockUrl || g.confidence.stockUrl === "low")) return true;
        if (colName === "Listing Price" && !g.detected.price) return true;
        if (colName === "Size" && !g.detected.size) return true;
        if (colName === "Sub-category" && g.confidence.subcategory === "low") return true;
        if (colName === "Title" && g.confidence.title === "low") return true;
        return false;
      }

      return (
        <>
          <Topbar
            crumb="Step 3 of 3"
            title="Export"
            right={
              <>
                <button className="btn ghost" onClick={onBack}>← Back</button>
                {!exported ? (
                  <button className="btn accent" onClick={exportXlsx}>{Icon.download} Export bulk_upload.xlsx</button>
                ) : (
                  <button className="btn primary" onClick={exportXlsx}>{Icon.check} Exported · Download again</button>
                )}
              </>
            }
          />
          <div className="workspace">
            <p className="section-sub">
              Preview of the populated workbook. The <code style={{ fontFamily: "var(--font-mono)", fontSize: 12 }}>Listing Details</code> tab gets {garments.length} new rows starting at row 3. All other tabs (taxonomy, colors, sizes, dropdown validations) are preserved exactly from the template.
            </p>

            <div className="export-grid">
              <div className="xlsx-preview">
                <div className="xlsx-tabs">
                  {["Listing Details", "Dept Cat Subcat Taxonomy", "Color Mapping", "Size Taxonomy"].map((t) => (
                    <button key={t} className={`xlsx-tab ${tab === t ? "active" : ""}`} onClick={() => setTab(t)}>{t}</button>
                  ))}
                </div>
                <div className="xlsx-scroll">
                  {tab === "Listing Details" ? (
                    <table className="xlsx-table">
                      <thead>
                        <tr>
                          <th className="row-num">#</th>
                          {visibleCols.map((c) => <th key={c}>{c}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        <tr className="header-row">
                          <td className="row-num">1</td>
                          {visibleCols.map((c) => <td key={c}>{c}</td>)}
                        </tr>
                        <tr className="instruction-row">
                          <td className="row-num">2</td>
                          <td colSpan={visibleCols.length}>Required fields are SKU, Title, Description, Department, Category, Quantity, Size, Condition, Brand, Color1, Original Price, Listing Price, Availability, Primary image. Data begins on row 3.</td>
                        </tr>
                        {rows.map((r, ri) => {
                          const g = garments[ri];
                          return (
                            <tr key={ri}>
                              <td className="row-num">{ri + 3}</td>
                              {visibleCols.map((c) => {
                                const val = r[c];
                                const flag = isFlagField(g, c);
                                return (
                                  <td key={c} className={`${flag ? "flag" : ""} ${!val ? "empty" : ""}`}
                                    style={c === "Description" ? { maxWidth: 320, whiteSpace: "normal", overflow: "hidden", textOverflow: "ellipsis" } : c === "Primary image" ? { maxWidth: 280, overflow: "hidden", textOverflow: "ellipsis" } : undefined}>
                                    {c === "Description" && val ? val.split("\n")[0].slice(0, 80) + (val.length > 80 ? "…" : "") : (val || (val === 0 ? 0 : <span>—</span>))}
                                  </td>
                                );
                              })}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  ) : (
                    <div style={{ padding: 32, color: "var(--ink-3)", fontSize: 13, display: "flex", alignItems: "center", gap: 10 }}>
                      {Icon.eye} <span>Preserved from template — not modified. {tab} tab includes the dropdown validations that power the form.</span>
                    </div>
                  )}
                </div>
              </div>

              <div className="export-side">
                <div className="card export-card">
                  <h3>Save as</h3>
                  <p className="sub">Workbook is written into a dated folder.</p>
                  <div className="export-filename">
                    {Icon.folder} {folder}{filename}
                  </div>
                  <div className="export-summary">
                    <div className="row"><span className="lbl">Rows added</span><span className="val">{rows.length}</span></div>
                    <div className="row"><span className="lbl">Tab modified</span><span className="val">Listing Details</span></div>
                    <div className="row"><span className="lbl">Starts at row</span><span className="val">3</span></div>
                    <div className="row"><span className="lbl">Validations</span><span className="val">preserved</span></div>
                  </div>
                  {!exported ? (
                    <button className="btn accent" onClick={exportXlsx} style={{ width: "100%", justifyContent: "center" }}>
                      {Icon.download} Export workbook
                    </button>
                  ) : (
                    <>
                      <button className="btn primary" onClick={exportXlsx} style={{ width: "100%", justifyContent: "center", marginBottom: 8 }}>{Icon.download} Re-download</button>
                      <button className="btn" style={{ width: "100%", justifyContent: "center" }}>{Icon.external} Open in Excel</button>
                    </>
                  )}
                </div>

                <div className="card export-card">
                  <h3 style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    Needs review
                    <span className="pill warn">{reviewItems.length}</span>
                  </h3>
                  <p className="sub">Low-confidence fields and missing required values. Cells are highlighted in the preview.</p>
                  {reviewItems.length === 0 ? (
                    <div className="pill ok" style={{ padding: "6px 10px" }}>{Icon.check} Nothing flagged</div>
                  ) : (
                    <div className="review-list">
                      {reviewItems.map((r, i) => (
                        <div key={i} className="review-item">
                          <span className="pill warn dot" style={{ padding: "2px 7px" }}>{r.field}</span>
                          <span className="name">{r.garment.detected.brand}</span>
                          <span className="why">{r.garment.detected.sku}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="card export-card" style={{ background: "var(--surface-tint)" }}>
                  <h3 style={{ fontSize: 18 }}>SKU sequence</h3>
                  <p className="sub" style={{ marginBottom: 10 }}>Per-brand counters are persisted across runs.</p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, fontFamily: "var(--font-mono)", fontSize: 12 }}>
                    {Object.entries(garments.reduce((acc, g) => {
                      acc[g.detected.brand] = (acc[g.detected.brand] || 0) + 1;
                      return acc;
                    }, {})).map(([brand, n]) => (
                      <div key={brand} style={{ display: "flex", justifyContent: "space-between" }}>
                        <span>{brand}</span>
                        <span className="muted">next → {brand.split(" ").map((w) => w[0].toUpperCase()).join("")}{String(n + 1).padStart(4, "0")}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>

          <Toast msg={toast} />
        </>
      );
    }

    /* ========================= APP SHELL ========================= */
    function App() {
      const [step, setStep] = useState(0);
      const [status, setStatus] = useState({ 0: "todo", 1: "todo", 2: "todo" });
      const [garments, setGarments] = useState(INITIAL_GARMENTS);
      const [apiKey, setApiKey] = useState("");

      const go = (n) => setStep(n);

      return (
        <div className="app mood-vault density-workhorse photo-silhouette">
          <Sidebar step={step} setStep={setStep} status={status} garments={garments} apiKey={apiKey} setApiKey={setApiKey} />
          <main className="canvas">
            {step === 0 && <StepPhotos onContinue={() => go(1)} status={status} setStatus={setStatus} garments={garments} setGarments={setGarments} />}
            {step === 1 && <StepResearch onContinue={() => go(2)} onBack={() => go(0)} status={status} setStatus={setStatus} garments={garments} setGarments={setGarments} apiKey={apiKey} setApiKey={setApiKey} />}
            {step === 2 && <StepExport onBack={() => go(1)} status={status} setStatus={setStatus} garments={garments} />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
